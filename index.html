<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UPT PSDA Presence - Integrated</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        
        :root {
            --brand-orange: #ff7a1a;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #f0f2f5;
            color: #1e293b;
            margin: 0;
            overflow-x: hidden;
        }

        .main-card {
            background: white;
            border-radius: 48px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            width: 100%;
            max-width: 1000px;
            min-height: 600px;
            display: flex;
            flex-direction: column;
        }

        @media (min-width: 768px) {
            .main-card { flex-direction: row; }
        }

        .left-panel {
            flex: 1.2;
            padding: 40px;
            display: flex;
            flex-direction: column;
        }

        .right-panel {
            flex: 1;
            background: #fff1e0;
            padding: 40px;
            position: relative;
            overflow: hidden;
            display: none; 
        }

        @media (min-width: 768px) {
            .right-panel { display: flex; flex-direction: column; justify-content: space-between; }
        }

        .orange-blob {
            position: absolute;
            width: 300px;
            height: 300px;
            background: var(--brand-orange);
            border-radius: 50%;
            bottom: -80px;
            right: -80px;
            z-index: 1;
        }

        .input-group {
            background: #f8fafc;
            border: 1px solid #f1f5f9;
            border-radius: 20px;
            padding: 12px 20px;
            transition: all 0.3s ease;
        }

        .input-group:focus-within {
            border-color: var(--brand-orange);
            background: white;
            box-shadow: 0 0 0 4px rgba(255, 122, 26, 0.1);
        }

        .input-group label {
            display: block;
            font-size: 10px;
            font-weight: 800;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 2px;
        }

        .input-group input, .input-group select {
            width: 100%;
            background: transparent;
            border: none;
            outline: none;
            font-weight: 600;
            color: #1e293b;
        }

        .page-section { display: none; width: 100%; }
        .page-section.active { display: block; }

        .loader-spin {
            border: 2px solid #fff;
            border-top: 2px solid transparent;
            border-radius: 50%;
            width: 16px;
            height: 16px;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .btn-primary {
            background: var(--brand-orange);
            color: white;
            padding: 18px;
            border-radius: 24px;
            font-weight: 700;
            transition: transform 0.2s;
            box-shadow: 0 10px 20px -5px rgba(255, 122, 26, 0.4);
        }

        .btn-primary:active { transform: scale(0.98); }

        .btn-primary:disabled {
            background: #cbd5e1;
            box-shadow: none;
            cursor: not-allowed;
        }

        .qr-box {
            background: white;
            padding: 8px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            width: fit-content;
        }

        /* Toast Animation */
        @keyframes slideInUp {
            from { transform: translate(-50%, 100%); opacity: 0; }
            to { transform: translate(-50%, 0); opacity: 1; }
        }
        .animate-toast { animation: slideInUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="main-card">
        <!-- LEFT CONTENT -->
        <div class="left-panel">
            
            <!-- PAGE: LOGIN -->
            <div id="login-page" class="page-section active">
                <div class="mb-10">
                    <img src="https://lh3.googleusercontent.com/d/1jMrmCABKhr0PWxsEap_Y8zO0WV7kUXOx" class="h-10 mb-8" alt="Logo">
                    <h1 class="text-4xl font-extrabold tracking-tight">Masuk</h1>
                </div>

                <form id="login-form" class="space-y-4">
                    <div class="input-group">
                        <label>ID / No HP</label>
                        <div class="flex items-center gap-3">
                            <span class="text-slate-400">@</span>
                            <input type="text" id="login-id" placeholder="Masukkan ID anda" required>
                        </div>
                    </div>
                    <div class="input-group">
                        <label>Kata Sandi</label>
                        <div class="flex items-center justify-between">
                            <input type="password" id="login-password" placeholder="••••••••" required>
                            <button type="button" onclick="navigateTo('forgot')" class="text-[10px] font-bold text-orange-500">LUPA?</button>
                        </div>
                    </div>
                    
                    <div class="flex gap-3 pt-4">
                        <button type="submit" class="flex-1 btn-primary">Masuk</button>
                        <button type="button" onclick="toggleScanner(true)" class="bg-slate-100 p-5 rounded-3xl hover:bg-slate-200 transition-colors">
                            <i data-lucide="qr-code" class="text-slate-600"></i>
                        </button>
                    </div>
                </form>

                <div class="mt-12 text-center">
                    <p class="text-sm text-slate-400">Belum punya akun? 
                        <button onclick="navigateTo('register')" class="text-orange-500 font-bold hover:underline">Daftar Baru</button>
                    </p>
                </div>
            </div>

            <!-- PAGE: REGISTER -->
            <div id="register-page" class="page-section">
                <button onclick="navigateTo('login')" class="mb-6 flex items-center gap-2 text-[10px] font-bold text-slate-400 uppercase tracking-widest hover:text-black transition-colors">
                    <i data-lucide="chevron-left" class="w-4 h-4"></i> Kembali ke Login
                </button>

                <div class="flex justify-between items-start mb-6">
                    <div>
                        <h1 class="text-3xl font-extrabold">Pendaftaran</h1>
                        <p class="text-slate-400 text-sm mt-1">Lengkapi data profil Anda.</p>
                    </div>
                    <div class="flex flex-col items-end">
                        <div class="qr-box" id="qrcode-reg"></div>
                        <span id="reg-id-text" class="text-[10px] font-bold text-slate-400 mt-2 uppercase tracking-tighter">GENERATING...</span>
                    </div>
                </div>

                <form id="register-form" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="md:col-span-2 flex justify-center mb-2">
                        <div class="relative group">
                            <input type="file" id="foto-input" class="hidden" accept="image/*">
                            <label for="foto-input" id="foto-label" class="w-24 h-24 rounded-full border-4 border-white shadow-xl bg-slate-50 flex flex-col items-center justify-center cursor-pointer overflow-hidden hover:border-orange-200 transition-all">
                                <i data-lucide="camera" class="text-slate-300"></i>
                                <span class="text-[8px] font-bold text-slate-400 mt-1 uppercase">Profil</span>
                            </label>
                        </div>
                    </div>

                    <div class="input-group">
                        <label>Nama Lengkap</label>
                        <input type="text" id="reg-nama" placeholder="Nama sesuai KTP" required>
                    </div>
                    <div class="input-group">
                        <label>Alamat Email</label>
                        <input type="email" id="reg-email" placeholder="nama@email.com" required>
                    </div>
                    <div class="input-group">
                        <label>Nomor Whatsapp</label>
                        <input type="text" id="reg-wa" placeholder="0812xxxx" required>
                    </div>
                    <div class="input-group">
                        <label>Jabatan</label>
                        <select id="reg-jabatan" required>
                            <option value="">Pilih Jabatan</option>
                            <option value="Koordinator Lapangan">Koordinator Lapangan</option>
                            <option value="Petugas Pintu Air">Petugas Pintu Air</option>
                            <option value="Pekarya">Pekarya</option>
                        </select>
                    </div>
                    <div class="input-group md:col-span-2">
                        <label>Kata Sandi</label>
                        <input type="password" id="reg-pass" placeholder="••••••••" required>
                    </div>

                    <div class="md:col-span-2 pt-2">
                        <button type="submit" id="reg-submit-btn" class="w-full btn-primary flex items-center justify-center gap-3">
                            <span id="reg-btn-text">Daftar Akun</span>
                            <div id="reg-loader" class="loader-spin hidden"></div>
                        </button>
                    </div>
                </form>
            </div>

            <!-- PAGE: FORGOT -->
            <div id="forgot-page" class="page-section text-center py-10">
                <div class="w-16 h-16 bg-orange-100 text-orange-600 rounded-full flex items-center justify-center mx-auto mb-6">
                    <i data-lucide="key-round" size="32"></i>
                </div>
                <h2 class="text-2xl font-bold mb-2">Lupa Kata Sandi?</h2>
                <p class="text-slate-500 text-sm mb-8">Hubungi Admin UPT untuk mereset kata sandi Anda melalui Whatsapp.</p>
                <button onclick="navigateTo('login')" class="text-orange-500 font-bold">Kembali Ke Login</button>
            </div>
        </div>

        <!-- RIGHT PANEL -->
        <div class="right-panel">
            <div class="relative z-10">
                <div class="bg-white/90 backdrop-blur inline-block px-4 py-2 rounded-2xl shadow-sm mb-8">
                    <p class="text-[10px] font-bold text-orange-500 uppercase tracking-tighter">Live Presence</p>
                </div>
                <h2 id="display-day" class="text-6xl font-light text-slate-800">Hari</h2>
                <h2 id="display-date" class="text-6xl font-black text-slate-400 opacity-30">Tanggal</h2>
                
                <div class="mt-12 border-l-4 border-orange-500 pl-6">
                    <p id="display-time" class="text-3xl font-bold text-slate-800 tracking-tighter">00:00:00 WIB</p>
                    <p class="text-slate-500 text-sm">Lokasi: Bondowoso</p>
                </div>
            </div>
            <div class="orange-blob"></div>
        </div>
    </div>

    <!-- SCANNER MODAL -->
    <div id="scan-modal" class="fixed inset-0 bg-black/60 backdrop-blur-sm hidden items-center justify-center z-50 p-6">
        <div class="bg-white w-full max-w-sm rounded-[40px] p-10 text-center">
            <div class="relative w-48 h-48 mx-auto mb-8 border-4 border-orange-500 rounded-3xl flex items-center justify-center overflow-hidden">
                <i data-lucide="scan" size="64" class="text-orange-500 opacity-20"></i>
                <div class="absolute top-0 w-full h-1 bg-orange-500 animate-[bounce_2s_infinite]"></div>
            </div>
            <h3 class="text-xl font-bold mb-2">Scan Login</h3>
            <p class="text-slate-500 text-sm mb-8">Fitur login melalui kamera sedang diproses.</p>
            <button onclick="toggleScanner(false)" class="w-full py-4 bg-slate-100 rounded-2xl font-bold">Tutup</button>
        </div>
    </div>

    <script>
        // URL SCRIPT GOOGLE APPS SCRIPT
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwRp9NOKnyIBWX0yPAQe5oiGkoYIiL13bRvWRcaJWwSUaTknSIJ5RlI2hvzE4MNL2VHww/exec"; 
        
        let currentId = "";
        let base64Foto = "";

        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            updateClock();
            setInterval(updateClock, 1000);
        });

        function updateClock() {
            const now = new Date();
            const days = ['Minggu', 'Senin', 'Selasa', 'Rabu', 'Kamis', 'Jumat', 'Sabtu'];
            const months = ['Jan', 'Feb', 'Mar', 'Apr', 'Mei', 'Jun', 'Jul', 'Agu', 'Sep', 'Okt', 'Nov', 'Des'];
            document.getElementById('display-day').innerText = days[now.getDay()];
            document.getElementById('display-date').innerText = `${now.getDate()} ${months[now.getMonth()]}`;
            document.getElementById('display-time').innerText = now.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit', second: '2-digit' }) + " WIB";
        }

        function showToast(message, type = 'success') {
            const oldToast = document.getElementById('custom-toast');
            if (oldToast) oldToast.remove();

            const toast = document.createElement('div');
            toast.id = 'custom-toast';
            toast.className = `fixed bottom-10 left-1/2 -translate-x-1/2 z-[100] px-6 py-4 rounded-2xl shadow-2xl flex items-center gap-3 animate-toast transition-all
                ${type === 'success' ? 'bg-orange-600 text-white' : 'bg-red-600 text-white'}`;
            
            const icon = type === 'success' ? 'check-circle' : 'alert-circle';
            toast.innerHTML = `
                <i data-lucide="${icon}" class="w-5 h-5"></i>
                <span class="font-bold text-sm tracking-tight">${message}</span>
            `;
            
            document.body.appendChild(toast);
            lucide.createIcons();

            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translate(-50%, 20px)';
                setTimeout(() => toast.remove(), 500);
            }, 4000);
        }

        function navigateTo(pageId) {
            document.querySelectorAll('.page-section').forEach(p => p.classList.remove('active'));
            document.getElementById(`${pageId}-page`).classList.add('active');
            if(pageId === 'register') generateId();
        }

        function generateId() {
            const date = new Date();
            const yearMonthDay = date.getFullYear().toString().substr(-2) + (date.getMonth()+1).toString().padStart(2, '0') + date.getDate().toString().padStart(2, '0');
            currentId = "UPT-" + yearMonthDay + "-" + Math.floor(100 + Math.random() * 899);
            
            document.getElementById('reg-id-text').innerText = currentId;
            const container = document.getElementById('qrcode-reg');
            container.innerHTML = "";
            new QRCode(container, { text: currentId, width: 80, height: 80, colorDark: "#1e293b" });
        }

        function toggleScanner(show) {
            document.getElementById('scan-modal').style.display = show ? 'flex' : 'none';
        }

        document.getElementById('foto-input').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                if (file.size > 2 * 1024 * 1024) {
                    showToast("Foto terlalu besar (Maks 2MB)", "error");
                    this.value = "";
                    return;
                }
                const reader = new FileReader();
                reader.onloadend = () => {
                    base64Foto = reader.result;
                    document.getElementById('foto-label').innerHTML = `<img src="${base64Foto}" class="w-full h-full object-cover">`;
                };
                reader.readAsDataURL(file);
            }
        });

        document.getElementById('register-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            if (!base64Foto) {
                showToast("Pas Foto Profil belum diunggah", "error");
                return;
            }

            const btn = document.getElementById('reg-submit-btn');
            const loader = document.getElementById('reg-loader');
            const btnText = document.getElementById('reg-btn-text');

            btn.disabled = true;
            loader.classList.remove('hidden');
            btnText.innerText = "Mengirim...";

            const payload = {
                action: 'register',
                id_user: currentId,
                nama: document.getElementById('reg-nama').value,
                email: document.getElementById('reg-email').value,
                wa: document.getElementById('reg-wa').value,
                jabatan: document.getElementById('reg-jabatan').value,
                password: document.getElementById('reg-pass').value,
                foto: base64Foto
            };

            try {
                // Gunakan mode no-cors jika mengalami kendala CORS, namun JSON.parse akan gagal.
                // Pendekatan terbaik adalah mengirim sebagai form-data atau teks mentah.
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors', // Menangani batasan CORS Google Script
                    cache: 'no-cache',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                // Karena no-cors tidak bisa membaca body response, kita asumsikan sukses jika fetch tidak error
                showToast("Pendaftaran Terkirim! ID Anda: " + currentId, "success");
                
                setTimeout(() => {
                    navigateTo('login');
                    this.reset();
                    base64Foto = "";
                    document.getElementById('foto-label').innerHTML = `<i data-lucide="camera" class="text-slate-300"></i><span class="text-[8px] font-bold text-slate-400 mt-1 uppercase">Profil</span>`;
                    lucide.createIcons();
                }, 2500);

            } catch (err) {
                console.error("Error:", err);
                showToast("Gagal terhubung ke server. Cek koneksi Anda.", "error");
            } finally {
                btn.disabled = false;
                loader.classList.add('hidden');
                btnText.innerText = "Daftar Akun";
            }
        });

        document.getElementById('login-form').addEventListener('submit', function(e) {
            e.preventDefault();
            showToast("Sistem sedang melakukan sinkronisasi database.", "error");
        });
    </script>
</body>
</html>
