<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UPT PSDA Presence</title>
    <!-- Tailwind CSS untuk Styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel untuk kompilasi JSX di Browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/lucide-react@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(12px); }
        .animate-spin-slow { animation: spin 8s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-[#f4f1ee]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        
        /** * Perbaikan Error: lucideReact is not defined.
         * Di browser via CDN, Lucide React tersedia di window.lucide atau window.LucideReact
         */
        const Icons = window.lucide || {};
        const { 
            Home, Camera, Calendar, UserPlus, LogOut, MapPin, 
            Mic, Settings, FileText, Menu, X, CheckCircle2, 
            Clock, AlertCircle, Scan, Users 
        } = Icons;

        // --- KONFIGURASI ---
        const LOGO_URL = "https://lh3.googleusercontent.com/d/1jMrmCABKhr0PWxsEap_Y8zO0WV7kUXOx";
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwRp9NOKnyIBWX0yPAQe5oiGkoYIiL13bRvWRcaJWwSUaTknSIJ5RlI2hvzE4MNL2VHww/exec";

        const App = () => {
            const [currentPage, setCurrentPage] = useState('login');
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(false);
            const [sidebarOpen, setSidebarOpen] = useState(false);
            const [notification, setNotification] = useState(null);

            const [loginData, setLoginData] = useState({ identifier: '', password: '' });
            const [attendanceStep, setAttendanceStep] = useState(1);
            const [presenceData, setPresenceData] = useState({
                status: '', location: null, keterangan: '', photoSelfie: null, photoWork: null
            });

            const demoUser = {
                ID_User: "U-001",
                Nama_Lengkap: "Admin Demo",
                Jabatan: "Korlap",
                Wilayah: "Bondowoso",
                Foto_Profil: LOGO_URL
            };

            const showNotif = (msg, type = 'success') => {
                setNotification({ msg, type });
                setTimeout(() => setNotification(null), 3000);
            };

            const handleLogin = (e) => {
                e.preventDefault();
                setLoading(true);
                setTimeout(() => {
                    if (loginData.identifier === 'admin' && loginData.password === '123') {
                        setUser(demoUser);
                        setCurrentPage('dashboard');
                    } else {
                        showNotif("Login gagal. Gunakan admin/123", "error");
                    }
                    setLoading(false);
                }, 1000);
            };

            const startPresence = () => {
                setLoading(true);
                if ("geolocation" in navigator) {
                    navigator.geolocation.getCurrentPosition((pos) => {
                        setPresenceData(prev => ({
                            ...prev,
                            location: { lat: pos.coords.latitude, lng: pos.coords.longitude }
                        }));
                        setCurrentPage('presence');
                        setAttendanceStep(1);
                        setLoading(false);
                    }, () => {
                        showNotif("GPS Error: Aktifkan Lokasi", "error");
                        setLoading(false);
                    });
                }
            };

            // UI Elements
            const Sidebar = () => (
                <div className={`fixed inset-y-0 left-0 z-50 w-64 bg-white shadow-2xl transform ${sidebarOpen ? 'translate-x-0' : '-translate-x-full'} lg:translate-x-0 transition-transform duration-300 ease-in-out`}>
                    <div className="p-6 flex flex-col h-full">
                        <div className="flex items-center gap-3 mb-10">
                            <img src={LOGO_URL} className="w-10 h-10 object-contain" />
                            <span className="font-bold text-gray-800 text-lg">UPT PSDA</span>
                        </div>
                        <nav className="flex-1 space-y-2">
                            <MenuLink icon={Home ? <Home /> : <span>H</span>} label="Dashboard" active={currentPage === 'dashboard'} onClick={() => setCurrentPage('dashboard')} />
                            <MenuLink icon={Camera ? <Camera /> : <span>C</span>} label="Presensi" active={currentPage === 'presence'} onClick={startPresence} />
                            <MenuLink icon={UserPlus ? <UserPlus /> : <span>U</span>} label="Pendaftaran" active={currentPage === 'register'} onClick={() => setCurrentPage('register')} />
                            <MenuLink icon={Calendar ? <Calendar /> : <span>K</span>} label="Kalender" active={currentPage === 'calendar'} onClick={() => setCurrentPage('calendar')} />
                        </nav>
                        <button onClick={() => {setUser(null); setCurrentPage('login');}} className="mt-auto flex items-center gap-3 p-3 text-red-500 hover:bg-red-50 rounded-xl transition-all">
                            {LogOut && <LogOut size={20} />} <span className="font-medium">Keluar</span>
                        </button>
                    </div>
                </div>
            );

            const MenuLink = ({ icon, label, active, onClick }) => (
                <button onClick={() => { onClick(); setSidebarOpen(false); }} className={`w-full flex items-center gap-4 p-3 rounded-xl transition-all ${active ? 'bg-orange-500 text-white shadow-lg' : 'text-gray-500 hover:bg-gray-100'}`}>
                    {icon && React.isValidElement(icon) ? React.cloneElement(icon, { size: 20 }) : icon}
                    <span className="font-medium">{label}</span>
                </button>
            );

            if (currentPage === 'login') {
                return (
                    <div className="min-h-screen bg-[#f4f1ee] flex items-center justify-center p-4">
                        <div className="grid grid-cols-1 md:grid-cols-2 bg-white/40 backdrop-blur-xl rounded-[40px] shadow-2xl max-w-4xl w-full overflow-hidden border border-white/50">
                            <div className="p-8 md:p-12">
                                <img src={LOGO_URL} className="h-10 mb-12" />
                                <h1 className="text-4xl font-light mb-8 text-gray-800">Masuk</h1>
                                <form onSubmit={handleLogin} className="space-y-6">
                                    <div className="bg-white/80 rounded-3xl p-4 flex items-center gap-3 border border-gray-100">
                                        <span className="text-gray-400">@</span>
                                        <input type="text" placeholder="ID / No HP" className="bg-transparent w-full outline-none" onChange={e => setLoginData({...loginData, identifier: e.target.value})} />
                                    </div>
                                    <div className="bg-white/80 rounded-3xl p-4 flex items-center gap-3 border border-gray-100">
                                        {Clock && <Clock size={18} className="text-gray-400" />}
                                        <input type="password" placeholder="Kata Sandi" className="bg-transparent w-full outline-none" onChange={e => setLoginData({...loginData, password: e.target.value})} />
                                    </div>
                                    <button type="submit" className="w-full bg-black text-white py-4 rounded-3xl font-bold hover:scale-[1.02] transition-transform">Masuk Sekarang</button>
                                </form>
                            </div>
                            <div className="hidden md:flex bg-gradient-to-br from-orange-100 to-orange-200 p-12 flex-col justify-between relative">
                                <div>
                                    <h2 className="text-5xl font-bold text-gray-800 opacity-80">UPT PSDA</h2>
                                    <p className="mt-4 text-gray-600">Sistem Presensi Digital Berbasis Lokasi & Foto Kerja.</p>
                                </div>
                                <div className="w-20 h-20 bg-orange-500 rounded-full animate-spin-slow opacity-20 absolute -right-10 top-1/2"></div>
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen bg-gray-50 flex">
                    <Sidebar />
                    <main className="flex-1 lg:ml-64 p-4 lg:p-8 pb-32">
                        <div className="flex justify-between items-center mb-8">
                            <div>
                                <h2 className="text-2xl font-bold text-gray-800">Halo, {user?.Nama_Lengkap}</h2>
                                <p className="text-gray-500">{user?.Jabatan} - {user?.Wilayah}</p>
                            </div>
                            <img src={user?.Foto_Profil} className="w-12 h-12 rounded-2xl border-2 border-orange-200 object-cover" />
                        </div>

                        {currentPage === 'dashboard' && (
                            <div className="space-y-6">
                                <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                                    <div className="bg-white p-6 rounded-[32px] shadow-sm text-center">
                                        <div className="text-green-500 mb-2 flex justify-center">{CheckCircle2 && <CheckCircle2 />}</div>
                                        <div className="text-2xl font-bold">22</div>
                                        <div className="text-[10px] uppercase font-bold text-gray-400">Hadir</div>
                                    </div>
                                    <div className="bg-white p-6 rounded-[32px] shadow-sm text-center">
                                        <div className="text-orange-500 mb-2 flex justify-center">{Clock && <Clock />}</div>
                                        <div className="text-2xl font-bold">2</div>
                                        <div className="text-[10px] uppercase font-bold text-gray-400">Terlambat</div>
                                    </div>
                                </div>
                                <div className="grid grid-cols-3 md:grid-cols-6 gap-4">
                                    <ActionButton label="Presensi" icon={Camera && <Camera />} color="bg-orange-100" text="text-orange-600" onClick={startPresence} />
                                    <ActionButton label="Agenda" icon={FileText && <FileText />} color="bg-blue-100" text="text-blue-600" onClick={() => setCurrentPage('agenda')} />
                                </div>
                            </div>
                        )}

                        {currentPage === 'presence' && (
                            <div className="max-w-xl mx-auto bg-white p-8 rounded-[40px] shadow-xl">
                                <h3 className="text-xl font-bold mb-6 flex items-center gap-3">
                                    <span className="w-8 h-8 bg-black text-white rounded-full flex items-center justify-center text-sm">{attendanceStep}</span>
                                    Langkah {attendanceStep}
                                </h3>
                                {attendanceStep === 1 && (
                                    <div className="space-y-6">
                                        <div className="h-48 bg-gray-100 rounded-3xl flex items-center justify-center">
                                            {MapPin && <MapPin className="text-orange-500 animate-bounce" size={40} />}
                                        </div>
                                        <button onClick={() => setAttendanceStep(2)} className="w-full bg-black text-white py-4 rounded-3xl font-bold">Konfirmasi Lokasi</button>
                                    </div>
                                )}
                            </div>
                        )}
                    </main>

                    {/* Notification Overlay */}
                    {notification && (
                        <div className={`fixed top-10 left-1/2 -translate-x-1/2 px-6 py-3 rounded-full shadow-2xl z-[100] text-white font-bold flex items-center gap-2 ${notification.type === 'error' ? 'bg-red-600' : 'bg-green-600'}`}>
                            {notification.msg}
                        </div>
                    )}

                    {/* Mobile Floating Menu */}
                    <div className="lg:hidden fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] glass rounded-full p-4 flex justify-around items-center shadow-2xl">
                        <button onClick={() => setCurrentPage('dashboard')}>{Home && <Home />}</button>
                        <button onClick={startPresence} className="bg-orange-500 p-4 rounded-full text-white -mt-12 shadow-xl">{Camera && <Camera />}</button>
                        <button onClick={() => setSidebarOpen(true)}>{Menu && <Menu />}</button>
                    </div>
                </div>
            );
        };

        const ActionButton = ({ label, icon, color, text, onClick }) => (
            <button onClick={onClick} className="flex flex-col items-center group">
                <div className={`w-14 h-14 ${color} ${text} rounded-2xl flex items-center justify-center mb-2 group-hover:scale-110 transition-transform shadow-sm`}>
                    {icon}
                </div>
                <span className="text-[10px] font-bold text-gray-500 uppercase">{label}</span>
            </button>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
